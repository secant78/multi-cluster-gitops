apiVersion: v1
kind: Service
metadata:
  name: {{ include "risk-engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "risk-engine.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default 8080 }}
      protocol: TCP
      name: http
  selector:
    {{- include "risk-engine.selectorLabels" . | nindent 4 }}
