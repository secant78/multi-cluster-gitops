replicaCount: 2

image:
  tag: stable

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  # Lower CPU threshold — risk engine must be fast, scale early
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 80

env:
  LOG_LEVEL: "warn"
  APP_ENV: "production"
  APP_VERSION: "1.0.0"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - risk-engine
        topologyKey: kubernetes.io/hostname
