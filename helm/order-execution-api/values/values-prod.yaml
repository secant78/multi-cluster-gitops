replicaCount: 3

image:
  tag: stable

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  LOG_LEVEL: "warn"
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  # Updated by scripts/setup-lattice.sh with actual Lattice DNS
  MARKET_DATA_URL: "http://<lattice-prod-dns>/api/v1/market-data"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - order-execution-api
        topologyKey: kubernetes.io/hostname
